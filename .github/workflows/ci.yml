name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Qt6 ──
      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          modules: "qtshadertools"
          cache: true

      # ── OpenCASCADE 7.9.3 (从 GitHub Release 下载 zip) ──
      - name: Cache OpenCASCADE
        id: cache-occt
        uses: actions/cache@v4
        with:
          path: C:\OCCT
          key: occt-7.9.3-vc14-64-combined-v1

      - name: Download and extract OpenCASCADE
        if: steps.cache-occt.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $occtUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_9_3/opencascade-7.9.3-vc14-64-combined.zip"
          $thirdPartyUrl = "https://github.com/Open-Cascade-SAS/OCCT/releases/download/V7_9_3/3rdparty-vc14-64.zip"
          $occtZip = "$env:RUNNER_TEMP\occt-combined.zip"
          $thirdpartyZip = "$env:RUNNER_TEMP\3rdparty.zip"

          Write-Host "Downloading OCCT 7.9.3 combined..."
          Invoke-WebRequest -Uri $occtUrl -OutFile $occtZip -MaximumRetryCount 3
          Write-Host "Downloading OCCT 3rdparty..."
          Invoke-WebRequest -Uri $thirdPartyUrl -OutFile $thirdpartyZip -MaximumRetryCount 3

          Write-Host "Extracting OCCT..."
          Expand-Archive -Path $occtZip -DestinationPath "C:\OCCT" -Force
          Write-Host "Extracting 3rdparty..."
          Expand-Archive -Path $thirdpartyZip -DestinationPath "C:\OCCT\3rdparty" -Force

          Write-Host "Verifying OCCT_ROOT..."
          if (Test-Path "C:\OCCT\inc") {
            Write-Host "OK: C:\OCCT\inc found"
          } else {
            # Zip 可能解压到子目录，需要查找
            $sub = Get-ChildItem "C:\OCCT" -Directory | Where-Object { Test-Path "$($_.FullName)\inc" } | Select-Object -First 1
            if ($sub) {
              Write-Host "Found OCCT at: $($sub.FullName)"
            } else {
              Get-ChildItem "C:\OCCT" -Recurse -Depth 2 | ForEach-Object { Write-Host "  $($_.FullName)" }
              Write-Error "OCCT inc/ directory not found"
              exit 1
            }
          }

      - name: Resolve OCCT_ROOT and OCCT_3RDPARTY_DIR
        shell: pwsh
        run: |
          $occtRoot = "C:\OCCT"
          $thirdPartyDir = "C:\OCCT\3rdparty"

          # OCCT zip 可能解压到子目录
          if (-not (Test-Path "$occtRoot\inc")) {
            $sub = Get-ChildItem $occtRoot -Directory | Where-Object { Test-Path "$($_.FullName)\inc" } | Select-Object -First 1
            if ($sub) { $occtRoot = $sub.FullName }
          }

          # 3rdparty 可能解压到子目录
          if (-not (Test-Path "$thirdPartyDir\vc14")) {
            $sub = Get-ChildItem $thirdPartyDir -Directory | Where-Object { Test-Path "$($_.FullName)\vc14" } | Select-Object -First 1
            if ($sub) { $thirdPartyDir = $sub.FullName }
          }

          Write-Host "OCCT_ROOT=$occtRoot"
          Write-Host "OCCT_3RDPARTY_DIR=$thirdPartyDir"
          "OCCT_ROOT=$occtRoot" | Out-File -Append $env:GITHUB_ENV
          "OCCT_3RDPARTY_DIR=$thirdPartyDir" | Out-File -Append $env:GITHUB_ENV

      # ── Vulkan SDK (需要 dxc 编译 shader) ──
      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK
          key: vulkan-1.4.335-v1

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/1.4.335.0/windows/VulkanSDK-1.4.335.0-Installer.exe"
          $installer = "$env:RUNNER_TEMP\vulkan-installer.exe"
          Write-Host "Downloading Vulkan SDK 1.4.335.0..."
          Invoke-WebRequest -Uri $url -OutFile $installer
          Write-Host "Installing Vulkan SDK..."
          Start-Process -FilePath $installer -ArgumentList "/S" -Wait -NoNewWindow

      - name: Set Vulkan SDK environment
        shell: pwsh
        run: |
          $vulkanDir = Get-ChildItem "C:\VulkanSDK" -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if ($vulkanDir) {
            "VULKAN_SDK=$($vulkanDir.FullName)" | Out-File -Append $env:GITHUB_ENV
            "$($vulkanDir.FullName)\Bin" | Out-File -Append $env:GITHUB_PATH
            Write-Host "VULKAN_SDK=$($vulkanDir.FullName)"
          } else {
            Write-Error "Vulkan SDK directory not found in C:\VulkanSDK"
            exit 1
          }

      # ── vcpkg ──
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "296b89248ad13be09e9324488eb4f74dd322d26c"

      # ── Configure & Build ──
      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DOCCT_ROOT="$env:OCCT_ROOT" `
            -DOCCT_3RDPARTY_DIR="$env:OCCT_3RDPARTY_DIR" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -- /maxcpucount